<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SGC — Area Visitatore</title>
  <link rel="stylesheet" href="css/Style.css" />
  <style>
    body { margin: 0; display: flex; min-height: 100vh; }

    .sidebar {
      width: 220px; min-height: 100vh; background: var(--color-surface, #1a1a2e);
      display: flex; flex-direction: column; padding: 24px 0; position: fixed;
      border-right: 1px solid rgba(255,255,255,0.08);
    }
    .sidebar-brand {
      padding: 0 24px 24px; font-size: 1.1rem; font-weight: 700;
      border-bottom: 1px solid rgba(255,255,255,0.08); margin-bottom: 16px;
    }
    .sidebar-brand span { color: var(--color-accent, #e63946); }
    .nav-item {
      padding: 12px 24px; cursor: pointer; transition: background .15s;
      font-size: .92rem; display: flex; align-items: center; gap: 10px;
      color: rgba(255,255,255,0.7);
    }
    .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.06); color: #fff; }
    .nav-item .icon { font-size: 1.1rem; width: 20px; text-align: center; }

    .main { margin-left: 220px; flex: 1; padding: 32px; }

    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; }
    .page-title  { font-size: 1.6rem; font-weight: 700; }
    .user-badge  { font-size: .9rem; opacity: .8; }

    .section { display: none; }
    .section.active { display: block; }

    /* Cards prenotazioni */
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
    .pren-card {
      background: rgba(255,255,255,0.05); border-radius: 10px; padding: 20px;
      border: 1px solid rgba(255,255,255,0.08); transition: border-color .2s;
    }
    .pren-card:hover { border-color: rgba(255,255,255,0.2); }
    .pren-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .pren-id { font-size: .8rem; opacity: .5; }
    .pren-data { font-size: 1.1rem; font-weight: 600; }
    .pren-det { font-size: .85rem; opacity: .7; margin: 4px 0; }

    .badge { padding: 3px 10px; border-radius: 20px; font-size: .78rem; font-weight: 600; }
    .badge-In_attesa  { background: rgba(255,193,7,.15);  color: #ffc107; }
    .badge-Confermata { background: rgba(40,167,69,.15);  color: #28a745; }
    .badge-Rifiutata  { background: rgba(220,53,69,.15);  color: #dc3545; }

    /* Form nuova prenotazione */
    .form-card {
      background: rgba(255,255,255,0.05); border-radius: 12px; padding: 28px;
      border: 1px solid rgba(255,255,255,0.08); max-width: 500px;
    }
    .form-card .form-group { margin-bottom: 16px; }
    .form-card label { display: block; font-size: .85rem; opacity: .7; margin-bottom: 6px; }
    .form-card input, .form-card select {
      width: 100%; padding: 10px 12px; border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.05);
      color: inherit; font-size: .9rem; box-sizing: border-box;
    }

    /* Profilo */
    .profile-card {
      background: rgba(255,255,255,0.05); border-radius: 12px; padding: 32px;
      border: 1px solid rgba(255,255,255,0.08); max-width: 460px;
    }
    .profile-avatar {
      width: 72px; height: 72px; border-radius: 50%;
      background: var(--color-accent, #e63946); display: flex; align-items: center;
      justify-content: center; font-size: 2rem; margin-bottom: 20px;
    }
    .profile-row { display: flex; justify-content: space-between; padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06); font-size: .9rem; }
    .profile-row:last-child { border-bottom: none; }
    .profile-label { opacity: .6; }

    .toast {
      position: fixed; bottom: 24px; right: 24px; padding: 12px 20px;
      border-radius: 8px; font-size: .9rem; z-index: 999; display: none;
      animation: slideIn .3s ease;
    }
    @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    .empty-state { text-align: center; padding: 60px 20px; opacity: .5; }
    .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }

    .btn-sm { padding: 5px 12px; font-size: .8rem; border-radius: 5px; }
    .btn-danger { background: #dc3545; color: #fff; border: none; cursor: pointer; }
  </style>
</head>
<body>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-brand"><span>SGC</span> Visitatore</div>
    <div class="nav-item active" onclick="showSection('prenotazioni')"><span class="icon">📅</span> Le mie prenotazioni</div>
    <div class="nav-item" onclick="showSection('nuova')">            <span class="icon">➕</span> Nuova prenotazione</div>
    <div class="nav-item" onclick="showSection('profilo')">          <span class="icon">👤</span> Il mio profilo</div>
    <div class="nav-item" style="margin-top:auto" onclick="logout()"><span class="icon">🚪</span> Logout</div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="page-header">
      <div class="page-title" id="section-title">Le mie prenotazioni</div>
      <div class="user-badge">👤 <span id="nome-utente"></span></div>
    </div>

    <!-- LE MIE PRENOTAZIONI -->
    <div class="section active" id="sec-prenotazioni">
      <div class="cards-grid" id="cards-prenotazioni">
        <div class="empty-state"><div class="icon">📭</div>Caricamento…</div>
      </div>
    </div>

    <!-- NUOVA PRENOTAZIONE -->
    <div class="section" id="sec-nuova">
      <div class="form-card">
        <h3 style="margin-top:0;margin-bottom:20px">Nuova prenotazione visita</h3>

        <div class="form-group">
          <label>Matricola detenuto</label>
          <input id="n-matricola" placeholder="es. DET001" />
        </div>
        <div class="form-group">
          <label>Data visita</label>
          <input id="n-data" type="date" />
        </div>
        <div class="form-group">
          <label>Tipo autorizzazione</label>
          <select id="n-tipo">
            <option value="Familiare">Familiare</option>
            <option value="Avvocato">Avvocato</option>
            <option value="Altro">Altro</option>
          </select>
        </div>

        <div class="alert alert-error hidden" id="n-alert" style="margin-bottom:14px">
          ⚠ <span id="n-alert-msg"></span>
        </div>

        <button class="btn btn-primary btn-full" onclick="inviaPrenotazione()">
          Invia prenotazione
        </button>

        <p style="font-size:.82rem;opacity:.5;margin-top:14px;text-align:center">
          La prenotazione verrà esaminata dall'amministratore.
        </p>
      </div>
    </div>

    <!-- PROFILO -->
    <div class="section" id="sec-profilo">
      <div class="profile-card">
        <div class="profile-avatar">👤</div>
        <div class="profile-row"><span class="profile-label">Nome</span>      <span id="pr-nome"></span></div>
        <div class="profile-row"><span class="profile-label">Ruolo</span>     <span>Visitatore</span></div>
      </div>
    </div>

  </main>

  <div class="toast" id="toast"></div>

  <script>
    // ── Auth ─────────────────────────────────────────────────────────────
    const token = sessionStorage.getItem('token');
    const ruolo = sessionStorage.getItem('ruolo');
    const nome  = sessionStorage.getItem('nome') || '';

    if (!token || ruolo !== 'visitatore') window.location.href = 'Login.html';

    document.getElementById('nome-utente').textContent = nome;
    document.getElementById('pr-nome').textContent     = nome;

    const authHeaders = () => ({
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + token
    });

    function toast(msg, ok = true) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.style.background = ok ? '#28a745' : '#dc3545';
      t.style.display = 'block';
      setTimeout(() => t.style.display = 'none', 3000);
    }

    function logout() {
      sessionStorage.clear();
      window.location.href = 'Login.html';
    }

    // ── Navigazione ───────────────────────────────────────────────────────
    const titles = {
      prenotazioni: 'Le mie prenotazioni',
      nuova:        'Nuova prenotazione',
      profilo:      'Il mio profilo'
    };

    function showSection(name) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      document.getElementById('sec-' + name).classList.add('active');
      // Attiva nav item corretto
      document.querySelectorAll('.nav-item').forEach(n => {
        if (n.getAttribute('onclick')?.includes(name)) n.classList.add('active');
      });
      document.getElementById('section-title').textContent = titles[name] || name;
      if (name === 'prenotazioni') caricaPrenotazioni();
    }

    // ── LE MIE PRENOTAZIONI ───────────────────────────────────────────────
    async function caricaPrenotazioni() {
      const container = document.getElementById('cards-prenotazioni');
      container.innerHTML = '<div class="empty-state"><div class="icon">⏳</div>Caricamento…</div>';

      try {
        const r = await fetch('/api/prenotazioni', { headers: authHeaders() });
        const lista = await r.json();

        if (!Array.isArray(lista) || lista.length === 0) {
          container.innerHTML = '<div class="empty-state"><div class="icon">📭</div>Nessuna prenotazione trovata.</div>';
          return;
        }

        container.innerHTML = lista.map(p => `
          <div class="pren-card">
            <div class="pren-header">
              <span class="pren-id">#${p.id}</span>
              <span class="badge badge-${p.esito}">${p.esito.replace('_', ' ')}</span>
            </div>
            <div class="pren-data">📅 ${p.data}</div>
            <div class="pren-det">🔒 Detenuto: <strong>${p.matricolaDetenuto}</strong></div>
            <div class="pren-det">📋 Tipo: ${p.tipoAutorizzazione}</div>
            ${p.motivoRifiuto ? `<div class="pren-det" style="color:#dc3545">Motivo rifiuto: ${p.motivoRifiuto}</div>` : ''}
            ${p.esito === 'In_attesa' ? `
              <button class="btn btn-danger btn-sm" style="margin-top:12px;width:100%"
                onclick="annullaPrenotazione(${p.id})">Annulla prenotazione</button>
            ` : ''}
          </div>
        `).join('');

      } catch (err) {
        container.innerHTML = '<div class="empty-state"><div class="icon">⚠️</div>Errore di caricamento.</div>';
      }
    }

    async function annullaPrenotazione(id) {
      if (!confirm('Annullare la prenotazione #' + id + '?')) return;
      try {
        const r = await fetch('/api/prenotazioni/' + id, {
          method: 'DELETE', headers: authHeaders()
        });
        const d = await r.json();
        if (d.ok) { toast('Prenotazione annullata'); caricaPrenotazioni(); }
        else toast(d.message || 'Errore', false);
      } catch (err) {
        toast('Errore di connessione', false);
      }
    }

    // ── NUOVA PRENOTAZIONE ────────────────────────────────────────────────
    async function inviaPrenotazione() {
      const alertEl  = document.getElementById('n-alert');
      const alertMsg = document.getElementById('n-alert-msg');
      alertEl.classList.add('hidden');

      const matricola = document.getElementById('n-matricola').value.trim();
      const data      = document.getElementById('n-data').value;
      const tipo      = document.getElementById('n-tipo').value;

      if (!matricola || !data) {
        alertMsg.textContent = 'Compila matricola e data.';
        alertEl.classList.remove('hidden');
        return;
      }

      try {
        const r = await fetch('/api/prenotazioni', {
          method: 'POST',
          headers: authHeaders(),
          body: JSON.stringify({ matricolaDetenuto: matricola, data, tipoAutorizzazione: tipo })
        });
        const d = await r.json();
        if (d.ok) {
          toast('✓ Prenotazione inviata! Attendi l\'approvazione.');
          document.getElementById('n-matricola').value = '';
          document.getElementById('n-data').value = '';
          showSection('prenotazioni');
        } else {
          alertMsg.textContent = d.message || 'Errore durante l\'invio.';
          alertEl.classList.remove('hidden');
        }
      } catch (err) {
        alertMsg.textContent = 'Errore di connessione al server.';
        alertEl.classList.remove('hidden');
      }
    }

    // Carica prenotazioni all'avvio
    caricaPrenotazioni();
  </script>

</body>
</html>
