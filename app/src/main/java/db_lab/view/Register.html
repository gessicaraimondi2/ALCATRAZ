<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SGC — Registrazione</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="auth-page">
    <div class="auth-box" style="max-width:500px">

      <div class="auth-logo">
        <div class="brand">SGC Sistema</div>
        <div class="title">Registrazione</div>
        <div class="subtitle">Crea il tuo account visitatore</div>
      </div>

      <!-- Alert -->
      <div class="alert alert-error hidden" id="alert-error">
        ⚠ <span id="alert-msg"></span>
      </div>
      <div class="alert alert-success hidden" id="alert-ok">
        ✓ Registrazione completata. <a href="Login.html">Accedi ora</a>
      </div>

      <!-- Form -->
      <div class="form-row">
        <div class="form-group">
          <label for="nome">Nome</label>
          <input type="text" id="nome" placeholder="Mario" />
        </div>
        <div class="form-group">
          <label for="cognome">Cognome</label>
          <input type="text" id="cognome" placeholder="Rossi" />
        </div>
      </div>

      <div class="form-group">
        <label for="cf">Codice Fiscale</label>
        <input type="text" id="cf" placeholder="RSSMRA80A01H501U" maxlength="16"
               style="font-family:var(--font-mono); text-transform:uppercase;" />
      </div>

      <div class="form-group">
        <label for="dataNascita">Data di nascita</label>
        <input type="date" id="dataNascita" />
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="nome@esempio.it" />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" />
        </div>
        <div class="form-group">
          <label for="passwordConf">Conferma password</label>
          <input type="password" id="passwordConf" placeholder="••••••••" />
        </div>
      </div>

      <div class="form-group">
        <label for="telefono">Telefono (opzionale)</label>
        <input type="tel" id="telefono" placeholder="+39 000 0000000" />
      </div>

      <button class="btn btn-primary btn-full btn-lg mt-2" onclick="handleRegister()">
        Crea account
      </button>

      <div class="auth-footer mt-2">
        Hai già un account? <a href="Login.html">Accedi</a>
      </div>

    </div>
  </div>

  <script>
    /**
     * BACKEND: POST /api/register
     * Body JSON: { nome, cognome, codiceFiscale, dataNascita, email, password, telefono }
     * Chiama model.inserisciVisitatore(v)
     * Risposta: { ok: true } oppure { ok: false, message: "..." }
     */
    async function handleRegister() {
      const nome       = document.getElementById('nome').value.trim();
      const cognome    = document.getElementById('cognome').value.trim();
      const cf         = document.getElementById('cf').value.trim().toUpperCase();
      const dataNascita= document.getElementById('dataNascita').value;
      const email      = document.getElementById('email').value.trim();
      const password   = document.getElementById('password').value;
      const passwordC  = document.getElementById('passwordConf').value;
      const telefono   = document.getElementById('telefono').value.trim();

      const errEl = document.getElementById('alert-error');
      const msgEl = document.getElementById('alert-msg');
      const okEl  = document.getElementById('alert-ok');

      errEl.classList.add('hidden');
      okEl.classList.add('hidden');

      // Validazione base
      if (!nome || !cognome || !cf || !dataNascita || !email || !password) {
        msgEl.textContent = 'Compila tutti i campi obbligatori.';
        errEl.classList.remove('hidden');
        return;
      }

      if (password !== passwordC) {
        msgEl.textContent = 'Le password non coincidono.';
        errEl.classList.remove('hidden');
        return;
      }

      if (cf.length !== 16) {
        msgEl.textContent = 'Il codice fiscale deve essere di 16 caratteri.';
        errEl.classList.remove('hidden');
        return;
      }

      try {
        const res = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nome, cognome, codiceFiscale: cf,
                                 dataNascita, email, password, telefono })
        });
        const data = await res.json();

        if (data.ok) {
          okEl.classList.remove('hidden');
        } else {
          msgEl.textContent = data.message || 'Errore durante la registrazione.';
          errEl.classList.remove('hidden');
        }
      } catch {
        // Demo: mostra solo successo
        okEl.classList.remove('hidden');
      }
    }
  </script>

</body>
</html>
