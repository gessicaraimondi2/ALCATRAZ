<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SGC — Registrazione</title>
  <link rel="stylesheet" href="css/Style.css" />
</head>
<body>

  <div class="auth-page">
    <div class="auth-box">

      <div class="auth-logo">
        <div class="brand">SGC Sistema</div>
        <div class="title">Registrazione</div>
        <div class="subtitle">Crea il tuo account visitatore</div>
      </div>

      <div class="alert alert-error hidden" id="alert-error">
        ⚠ <span id="alert-msg"></span>
      </div>
      <div class="alert alert-success hidden" id="alert-ok">
        ✓ <span id="ok-msg">Registrazione completata! Ora puoi accedere.</span>
      </div>

      <div class="form-group">
        <label for="nome">Nome</label>
        <input type="text" id="nome" placeholder="Mario" />
      </div>
      <div class="form-group">
        <label for="cognome">Cognome</label>
        <input type="text" id="cognome" placeholder="Rossi" />
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="mario.rossi@esempio.it" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" />
      </div>
      <div class="form-group">
        <label for="cf">Codice Fiscale</label>
        <input type="text" id="cf" placeholder="RSSMRA80A01H501Z" maxlength="16" />
      </div>

      <button class="btn btn-primary btn-full btn-lg mt-2" id="btn-register">
        Registrati
      </button>

      <div class="auth-divider">oppure</div>

      <div class="auth-footer">
        Hai già un account? <a href="Login.html">Accedi</a>
      </div>

    </div>
  </div>

  <script>
    async function handleRegister() {
      const alertErr = document.getElementById('alert-error');
      const alertOk  = document.getElementById('alert-ok');
      const msgEl    = document.getElementById('alert-msg');
      const btn      = document.getElementById('btn-register');

      alertErr.classList.add('hidden');
      alertOk.classList.add('hidden');

      const nome    = document.getElementById('nome').value.trim();
      const cognome = document.getElementById('cognome').value.trim();
      const email   = document.getElementById('email').value.trim();
      const password= document.getElementById('password').value;
      const cf      = document.getElementById('cf').value.trim();

      if (!nome || !cognome || !email || !password || !cf) {
        msgEl.textContent = 'Compila tutti i campi.';
        alertErr.classList.remove('hidden');
        return;
      }

      btn.textContent = 'Registrazione in corso…';
      btn.disabled = true;

      try {
        const res = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nome, cognome, email, password, codiceFiscale: cf })
        });

        const data = await res.json();

        if (data.ok) {
          alertOk.classList.remove('hidden');
          btn.textContent = '✓ Registrato';
          setTimeout(() => window.location.href = 'Login.html', 1800);
        } else {
          msgEl.textContent = data.message || 'Errore durante la registrazione.';
          alertErr.classList.remove('hidden');
          btn.textContent = 'Registrati';
          btn.disabled = false;
        }
      } catch (err) {
        msgEl.textContent = 'Errore di connessione al server.';
        alertErr.classList.remove('hidden');
        btn.textContent = 'Registrati';
        btn.disabled = false;
      }
    }

    document.getElementById('btn-register').addEventListener('click', handleRegister);
    document.addEventListener('keydown', e => { if (e.key === 'Enter') handleRegister(); });
  </script>

</body>
</html>
